<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frame Inference</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; background: #000; color: #d4d4d4; height: 100vh; overflow: hidden; }
  .layout { display: flex; height: 100vh; }

  .left { flex: 1; display: flex; flex-direction: column; padding: 24px 28px; gap: 12px; min-width: 0; }
  .title { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; }
  video { width: 100%; flex: 1; min-height: 0; background: #000; border: 1px solid #1a1a1a; }
  .bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .bar button {
    padding: 10px 22px; border: 1px solid #fff; background: transparent; color: #fff;
    font-family: inherit; font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .bar button:hover { background: #fff; color: #000; }
  .bar button:disabled { border-color: #333; color: #333; cursor: not-allowed; background: transparent; }
  .ts { font-size: 13px; color: #555; font-variant-numeric: tabular-nums; }
  .auto-label {
    display: flex; align-items: center; gap: 6px; font-size: 11px; color: #555;
    text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; user-select: none;
  }
  .auto-label input { accent-color: #fff; cursor: pointer; }
  .auto-label.active { color: #fff; }
  .stats { font-size: 10px; color: #333; letter-spacing: 0.06em; text-transform: uppercase; }
  .stats .s-val { color: #666; }
  .prompt-row input {
    width: 100%; padding: 10px 14px; border: 1px solid #1a1a1a; background: transparent;
    color: #888; font-family: inherit; font-size: 12px; outline: none;
  }
  .prompt-row input:focus { border-color: #333; color: #d4d4d4; }
  .prompt-row input::placeholder { color: #333; }

  .chart-container { border: 1px solid #1a1a1a; position: relative; }
  .chart-container canvas { width: 100%; height: 120px; display: block; }
  .chart-label { position: absolute; top: 4px; left: 8px; font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 0.08em; }

  .right { width: 480px; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; }
  .log-head {
    padding: 16px 20px 12px; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #1a1a1a;
  }
  .log-head span { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; }
  .log-head-btns { display: flex; gap: 6px; }
  .log-head button {
    padding: 4px 10px; border: 1px solid #222; background: transparent; color: #444;
    font-family: inherit; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer;
  }
  .log-head button:hover { color: #aaa; border-color: #444; }

  .entries { flex: 1; overflow-y: auto; padding: 10px 20px; }
  .entries::-webkit-scrollbar { width: 4px; }
  .entries::-webkit-scrollbar-thumb { background: #222; }

  .entry { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #111; }
  .entry:last-child { border-bottom: none; }
  .entry .at { font-size: 10px; color: #444; margin-bottom: 2px; letter-spacing: 0.06em; }
  .entry .odds { font-size: 9px; color: #555; margin-bottom: 3px; letter-spacing: 0.04em; }
  .entry .pbp { font-size: 10px; color: #6a6; margin-bottom: 3px; letter-spacing: 0.03em; }
  .entry .pbp-score { color: #555; }
  .entry .out { font-size: 11px; line-height: 1.5; color: #999; white-space: pre-wrap; font-variant-numeric: tabular-nums; }
  .entry.err .out { color: #c44; }
  .entry.pending .out { color: #333; }

  .scoreboard {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 12px 20px; border-bottom: 1px solid #1a1a1a; background: #0a0a0a;
  }
  .sb-team { font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #888; }
  .sb-team.left-t { color: #3b82f6; }
  .sb-team.right-t { color: #ef4444; }
  .sb-score { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 0.06em; font-variant-numeric: tabular-nums; }
  .sb-clock { font-size: 11px; color: #555; letter-spacing: 0.06em; text-align: center; margin-top: 2px; }

  .spin {
    display: inline-block; width: 8px; height: 8px;
    border: 1.5px solid #333; border-top-color: #888;
    border-radius: 50%; animation: sp 0.7s linear infinite; margin-right: 4px; vertical-align: middle;
  }
  @keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="layout">
  <div class="left">
    <div class="title">ARIZ vs KU &mdash; Frame Inference</div>
    <video id="video" controls>
      <source src="/video" type="video/mp4">
    </video>
    <div class="bar">
      <button id="captureBtn" onclick="manualCapture()">Capture</button>
      <label class="auto-label" id="autoLabel">
        <input type="checkbox" id="autoCheck" onchange="toggleAuto()"> Auto
      </label>
      <span class="ts" id="tsDisplay">0:00.0</span>
    </div>
    <div class="stats">
      inflight: <span class="s-val" id="inflightCount">0</span>
      &nbsp; done: <span class="s-val" id="doneCount">0</span>
      &nbsp; fps: <span class="s-val" id="inferFps">0</span>
    </div>
    <div class="chart-container">
      <span class="chart-label">Kalshi Odds</span>
      <canvas id="kalshiChart" height="120"></canvas>
    </div>
    <div class="prompt-row">
      <input id="promptInput" type="text" placeholder="custom prompt...">
    </div>
  </div>
  <div class="right">
    <div class="log-head">
      <span>Log</span>
      <div class="log-head-btns">
        <button onclick="exportCSV()">CSV</button>
        <button onclick="clearLog()">Clear</button>
      </div>
    </div>
    <div class="scoreboard">
      <div class="sb-team left-t" id="teamALabel">ARIZ</div>
      <div style="text-align:center">
        <div class="sb-score" id="sbScore">0 - 0</div>
        <div class="sb-clock" id="sbClock">--:-- | --</div>
      </div>
      <div class="sb-team right-t" id="teamBLabel">KU</div>
    </div>
    <div class="entries" id="logEntries"></div>
  </div>
</div>
<canvas id="canvas" style="display:none;"></canvas>
<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const logEntries = document.getElementById('logEntries');
const tsDisplay = document.getElementById('tsDisplay');
const SCALE_W = 480;

// Clamp video to last 30 minutes
const LAST_MINUTES = 30;
let videoStart = 0;
video.addEventListener('loadedmetadata', () => {
  videoStart = Math.max(0, video.duration - LAST_MINUTES * 60);
  video.currentTime = videoStart;
});
video.addEventListener('seeking', () => {
  if (video.currentTime < videoStart) video.currentTime = videoStart;
});

// State
let autoRunning = false;
let autoRafId = null;
let lastCaptureTime = -1;
let lastSendTime = 0;
let inflight = 0;
let doneTotal = 0;
const allRows = [];
let fpsTimestamps = [];
let frameBuffer = []; // rolling buffer for 2-frame batches

// Loaded data
let kalshiData = [];
let playsData = [];
let teamAName = 'ARIZ';
let teamBName = 'KU';

// --- Load data ---
async function loadData() {
  const [kalshiResp, playsResp] = await Promise.all([
    fetch('/api/kalshi').then(r => r.json()),
    fetch('/api/plays').then(r => r.json())
  ]);
  kalshiData = kalshiResp.data;
  playsData = playsResp.plays;
  teamAName = playsResp.away;
  teamBName = playsResp.home;
  document.getElementById('teamALabel').textContent = teamAName;
  document.getElementById('teamBLabel').textContent = teamBName;
  drawKalshiChart();
}
loadData();

// --- Kalshi chart ---
function drawKalshiChart(markerIdx) {
  const c = document.getElementById('kalshiChart');
  const dpr = window.devicePixelRatio || 1;
  const rect = c.getBoundingClientRect();
  c.width = rect.width * dpr;
  c.height = 120 * dpr;
  const cx = c.getContext('2d');
  cx.scale(dpr, dpr);
  const W = rect.width, H = 120;

  cx.fillStyle = '#0a0a0a';
  cx.fillRect(0, 0, W, H);
  if (!kalshiData.length) return;

  const pad = { t: 18, b: 16, l: 36, r: 12 };
  const gW = W - pad.l - pad.r;
  const gH = H - pad.t - pad.b;

  cx.strokeStyle = '#3b82f6'; cx.lineWidth = 1.2; cx.beginPath();
  for (let i = 0; i < kalshiData.length; i++) {
    const x = pad.l + (i / (kalshiData.length - 1)) * gW;
    const y = pad.t + gH - (kalshiData[i].a / 100) * gH;
    i === 0 ? cx.moveTo(x, y) : cx.lineTo(x, y);
  }
  cx.stroke();

  cx.strokeStyle = '#ef4444'; cx.lineWidth = 1.2; cx.beginPath();
  for (let i = 0; i < kalshiData.length; i++) {
    if (kalshiData[i].b === null) continue;
    const x = pad.l + (i / (kalshiData.length - 1)) * gW;
    const y = pad.t + gH - (kalshiData[i].b / 100) * gH;
    i === 0 || kalshiData[i-1]?.b === null ? cx.moveTo(x, y) : cx.lineTo(x, y);
  }
  cx.stroke();

  cx.fillStyle = '#333'; cx.font = '9px monospace'; cx.textAlign = 'right';
  for (const v of [0, 25, 50, 75, 100]) {
    const y = pad.t + gH - (v / 100) * gH;
    cx.fillText(v + '', pad.l - 4, y + 3);
    cx.strokeStyle = '#111'; cx.lineWidth = 0.5; cx.beginPath();
    cx.moveTo(pad.l, y); cx.lineTo(W - pad.r, y); cx.stroke();
  }

  if (markerIdx !== undefined && markerIdx >= 0 && markerIdx < kalshiData.length) {
    const x = pad.l + (markerIdx / (kalshiData.length - 1)) * gW;
    cx.strokeStyle = '#fff'; cx.lineWidth = 1; cx.setLineDash([2, 2]); cx.beginPath();
    cx.moveTo(x, pad.t); cx.lineTo(x, pad.t + gH); cx.stroke(); cx.setLineDash([]);
  }

  cx.font = '9px monospace'; cx.textAlign = 'left';
  cx.fillStyle = '#3b82f6'; cx.fillText(teamAName, pad.l + 4, pad.t + 10);
  cx.fillStyle = '#ef4444'; cx.fillText(teamBName, pad.l + 60, pad.t + 10);

  // Draw time labels on x-axis
  if (kalshiData.length > 1) {
    cx.fillStyle = '#444'; cx.textAlign = 'center'; cx.font = '8px monospace';
    const labelCount = Math.min(5, kalshiData.length);
    for (let li = 0; li < labelCount; li++) {
      const di = Math.round(li / (labelCount - 1) * (kalshiData.length - 1));
      const ts = kalshiData[di].ts;
      if (ts) {
        const d = new Date(ts);
        const lbl = d.getUTCHours().toString().padStart(2,'0') + ':' + d.getUTCMinutes().toString().padStart(2,'0');
        const lx = pad.l + (di / (kalshiData.length - 1)) * gW;
        cx.fillText(lbl, lx, H - 2);
      }
    }
  }
}

video.addEventListener('timeupdate', () => {
  const t = video.currentTime;
  const m = Math.floor(t / 60);
  const s = (t % 60).toFixed(1);
  tsDisplay.textContent = m + ':' + s.padStart(4, '0');
});

function captureFrame() {
  const scale = Math.min(1, SCALE_W / video.videoWidth);
  canvas.width = Math.round(video.videoWidth * scale);
  canvas.height = Math.round(video.videoHeight * scale);
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  return {
    timestamp: video.currentTime,
    base64: canvas.toDataURL('image/jpeg', 0.5).split(',')[1]
  };
}

function captureScoreboard() {
  const vw = video.videoWidth;
  const vh = video.videoHeight;
  const cropH = Math.round(vh * 0.15);
  const cropW = Math.round(vw * 0.9);
  const cropX = Math.round((vw - cropW) / 2);
  const cropY = vh - cropH;
  canvas.width = cropW;
  canvas.height = cropH;
  ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
  return canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
}

function updateStats() {
  document.getElementById('inflightCount').textContent = inflight;
  document.getElementById('doneCount').textContent = doneTotal;
  const now = performance.now();
  fpsTimestamps = fpsTimestamps.filter(t => now - t < 10000);
  const fps = fpsTimestamps.length > 1 ? (fpsTimestamps.length / ((now - fpsTimestamps[0]) / 1000)).toFixed(1) : '0';
  document.getElementById('inferFps').textContent = fps;
}

// --- Auto: capture every 1s, send batch of 2 every 2s ---
function toggleAuto() {
  const on = document.getElementById('autoCheck').checked;
  document.getElementById('autoLabel').classList.toggle('active', on);
  if (on) {
    autoRunning = true;
    lastCaptureTime = -1;
    lastSendTime = 0;
    frameBuffer = [];
    autoLoop();
  } else {
    autoRunning = false;
    if (autoRafId) cancelAnimationFrame(autoRafId);
  }
}

function autoLoop() {
  if (!autoRunning) return;
  autoRafId = requestAnimationFrame(autoLoop);
  if (video.paused || video.ended) return;

  const tRounded = Math.floor(video.currentTime);
  if (tRounded === lastCaptureTime) return;
  lastCaptureTime = tRounded;

  // Buffer frames
  frameBuffer.push(captureFrame());
  if (frameBuffer.length > 2) frameBuffer.shift();

  // Send every 2 seconds when we have 2 frames
  const now = performance.now();
  if (frameBuffer.length >= 2 && now - lastSendTime >= 2000) {
    const batch = frameBuffer.splice(0, 2);
    lastSendTime = now;
    fireInference(batch);
  }
}

function manualCapture() {
  fireInference([captureFrame()]);
}

// --- Fire VLM inference + scoreboard in parallel ---
function fireInference(frames) {
  inflight++;
  updateStats();

  // Capture scoreboard crop before canvas gets reused
  const sbImage = captureScoreboard();

  const timestamps = frames.map(f => f.timestamp.toFixed(1) + 's').join(', ');
  const entryId = 'e' + Date.now() + Math.random().toString(36).slice(2, 6);

  logEntries.insertAdjacentHTML('afterbegin',
    '<div class="entry pending" id="' + entryId + '">' +
    '<div class="at"><span class="spin"></span>' + timestamps + '</div>' +
    '<div class="out">...</div></div>'
  );

  const prompt = document.getElementById('promptInput').value || '';
  const payload = frames.map(f => ({ timestamp: f.timestamp, base64: f.base64 }));

  const vlmPromise = fetch('/infer', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ frames: payload, prompt: prompt })
  })
  .then(r => r.json())
  .then(data => {
    const el = document.getElementById(entryId);
    if (!el) return;
    el.classList.remove('pending');
    if (data.error) {
      el.classList.add('err');
      el.querySelector('.out').textContent = data.error;
    } else {
      el.querySelector('.out').textContent = data.response;
      const parsed = parseVLMRow(data.response);
      if (parsed) updateMomentum(parsed);
    }
    el.querySelector('.at').textContent = timestamps;
  })
  .catch(err => {
    const el = document.getElementById(entryId);
    if (!el) return;
    el.classList.remove('pending');
    el.classList.add('err');
    el.querySelector('.out').textContent = err.message;
  });

  const scoreboardPromise = fetch('/scoreboard', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ image: sbImage })
  })
  .then(r => r.json())
  .then(data => {
    if (!data.error) updateScoreboardUI(data);
  })
  .catch(() => {});

  Promise.allSettled([vlmPromise, scoreboardPromise]).then(() => {
    inflight--;
    doneTotal++;
    fpsTimestamps.push(performance.now());
    updateStats();
  });
}

// VLM only returns: action,momentum_team,momentum_score,momentum_reason
function parseVLMRow(text) {
  const line = text.trim().split('\n')[0];
  const cols = line.split(',');
  if (cols.length < 4) return null;
  return {
    action: cols[0]?.trim(),
    mTeam: cols[1]?.trim(),
    mScore: cols[2]?.trim(),
    mReason: cols[3]?.trim()
  };
}

// Momentum from VLM
function updateMomentum(parsed) {
  allRows.push([parsed.action, parsed.mTeam, parsed.mScore, parsed.mReason].join(','));
}

function updateScoreboardUI(data) {
  if (data.score_a && data.score_b) {
    document.getElementById('sbScore').textContent = data.score_a + ' - ' + data.score_b;
  }
  if (data.clock || data.half) {
    const clockStr = data.clock || '--:--';
    const halfStr = data.half || '--';
    document.getElementById('sbClock').textContent = clockStr + ' | ' + halfStr;
  }
}

function exportCSV() {
  const header = 'action,momentum_team,momentum_score,momentum_reason';
  const csv = header + '\n' + allRows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'inference_log.csv';
  a.click();
}

function clearLog() {
  logEntries.innerHTML = '';
  allRows.length = 0;
  doneTotal = 0;
  frameBuffer = [];
  document.getElementById('sbScore').textContent = '0 - 0';
  document.getElementById('sbClock').textContent = '--:-- | --';
  drawKalshiChart();
  updateStats();
}

window.addEventListener('resize', () => drawKalshiChart());
</script>
</body>
</html>
